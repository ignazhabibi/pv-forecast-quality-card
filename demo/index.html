<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PV Forecast Quality Card preview</title>
    <style>
      :root {
        color-scheme: light;
        --primary-text-color: #111827;
        --secondary-text-color: #667085;
        --primary-color: #03a9f4;
        --card-background-color: #ffffff;
        --ha-card-background: #ffffff;
        --secondary-background-color: #f2f4f7;
        --divider-color: #d9dde3;
        --ha-card-border-radius: 12px;
        --ha-font-family-body: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 40px;
        color: var(--primary-text-color);
        background: #eef1f5;
        font-family: var(--ha-font-family-body);
      }

      main {
        width: min(1120px, 100%);
        margin: 0 auto;
      }

      .page-title {
        margin: 0 0 6px;
        font-size: 28px;
      }

      .page-copy {
        margin: 0 0 28px;
        color: var(--secondary-text-color);
        font-size: 14px;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        align-items: start;
      }

      pv-forecast-quality-card,
      pv-forecast-day-card,
      pv-forecast-history-card {
        min-width: 0;
      }

      pv-forecast-day-card,
      pv-forecast-history-card {
        grid-column: 1 / -1;
      }

      ha-card {
        box-shadow: 0 1px 2px rgb(16 24 40 / 6%);
      }

      @media (max-width: 760px) {
        body {
          padding: 20px;
        }

        .cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="page-title">PV-Prognosen im Vergleich</h1>
      <p class="page-copy">Day-ahead-Prognose gegen die tatsächliche PV-Erzeugung.</p>
      <section class="cards" aria-label="PV-Prognosequalität">
        <pv-forecast-quality-card id="power"></pv-forecast-quality-card>
        <pv-forecast-quality-card id="energy"></pv-forecast-quality-card>
        <pv-forecast-day-card id="day"></pv-forecast-day-card>
        <pv-forecast-history-card id="history"></pv-forecast-history-card>
      </section>
    </main>

    <script type="module">
      import "../dist/pv-forecast-quality-card.js";

      const state = (entity_id, value, friendly_name, attributes = {}) => ({
        entity_id,
        state: String(value),
        attributes: { friendly_name, ...attributes },
        last_updated: new Date().toISOString(),
      });

      const at = (hour, minute = 0) => {
        const date = new Date();
        date.setHours(hour, minute, 0, 0);
        return date;
      };

      const forecast = (step, value) => ({
        period_start: at(5 + Math.floor(step / 2), (step % 2) * 30).toISOString(),
        pv_estimate: value,
      });
      const solcast = Array.from({ length: 34 }, (_, index) => {
        const hour = 5 + index / 2;
        const phase = Math.max(0, Math.sin(((hour - 5.5) / 16) * Math.PI));
        const weather = 0.92 - 0.16 * Math.exp(-((hour - 14) ** 2) / 5);
        return forecast(index, phase * weather * 6900 / 1000);
      });
      const helios = Array.from({ length: 37 }, (_, index) => {
        const hour = 5 + Math.floor(index / 4);
        const minute = (index % 4) * 15;
        const phase = Math.max(0, Math.sin(((hour + minute / 60 - 5.5) / 16) * Math.PI));
        return { datetime: at(hour, minute).toISOString(), watts: phase * 6400 };
      });
      const actualHistory = Array.from({ length: 150 }, (_, index) => {
        const date = at(5, 30);
        date.setMinutes(date.getMinutes() + index * 5);
        const hour = date.getHours() + date.getMinutes() / 60;
        const envelope = Math.max(0, Math.sin(((hour - 5.5) / 16) * Math.PI));
        const cloud = 0.78 + 0.22 * Math.sin(index * 1.7) ** 2;
        return { s: String(envelope * cloud * 7600), a: {}, lu: date.getTime() / 1000 };
      }).filter((entry) => entry.lu * 1000 <= Date.now());

      const dailyStatistic = (value, index) => {
        const start = new Date();
        start.setHours(0, 0, 0, 0);
        start.setDate(start.getDate() - (29 - index));
        return { start: start.getTime(), mean: value };
      };
      const solcastEnergyHistory = [12, 18, 7, 25, 31, 21, 14, -3, 9, 16, 28, 24, 19, 33, 11, 6, 17, 22, 27, 15, 8, -5, 13, 20, 26, 18, 10, 23, 21, 24.8].map(dailyStatistic);
      const heliosEnergyHistory = [-4, 5, -2, 8, 18, 10, -1, -7, 13, 4, 7, 20, -5, 9, 1, -3, 21, 6, 8, 18, -2, -9, 3, 25, 6, 1, -14, 5, 0, -2.6].map(dailyStatistic);
      const solcastMaeHistory = [1.18, 1.31, 0.92, 1.44, 1.62, 1.35, 1.08, 0.84, 1.02, 1.26, 1.51, 1.47, 1.22, 1.68, 1.04, 0.91, 1.19, 1.38, 1.49, 1.23, 0.96, 0.81, 1.11, 1.34, 1.53, 1.28, 1.01, 1.42, 1.37, 1.22].map(dailyStatistic);
      const heliosMaeHistory = [0.88, 0.97, 0.74, 1.03, 1.21, 0.94, 0.79, 0.92, 1.09, 0.83, 0.98, 1.32, 0.86, 1.17, 0.72, 0.81, 1.26, 0.91, 1.02, 1.29, 0.76, 1.01, 0.82, 1.46, 0.95, 0.73, 1.17, 0.89, 0.78, 0.93].map(dailyStatistic);

      const hass = {
        locale: { language: "de-DE" },
        states: {
          "sensor.solcast_mae": state("sensor.solcast_mae", 1.5, "Solcast MAE heute"),
          "sensor.helios_mae": state("sensor.helios_mae", 1.218, "Helios MAE heute"),
          "sensor.solcast_energy": state("sensor.solcast_energy", 23.7, "Solcast Ertragsabweichung"),
          "sensor.helios_energy": state("sensor.helios_energy", -2.4, "Helios Ertragsabweichung"),
          "counter.intervals": state("counter.intervals", 26, "Ausgewertete Intervalle"),
          "input_text.snapshot": state(
            "input_text.snapshot",
            "2026-07-20|2026-07-20T09:10:22+02:00|bootstrap",
            "Snapshot",
          ),
          "sensor.pv_power": state("sensor.pv_power", 925, "PV-Leistung", {
            unit_of_measurement: "W",
          }),
          "sensor.solcast_today": state("sensor.solcast_today", 51.2, "Solcast heute", {
            unit_of_measurement: "kWh",
            detailedForecast: solcast,
          }),
          "sensor.helios_power": state("sensor.helios_power", 578, "Helios Leistung", {
            unit_of_measurement: "W",
            forecast: helios,
          }),
        },
        callWS: async (message) => {
          if (message.type === "recorder/statistics_during_period") {
            return {
              "sensor.solcast_mae_day": solcastMaeHistory,
              "sensor.helios_mae_day": heliosMaeHistory,
              "sensor.solcast_energy_day": solcastEnergyHistory,
              "sensor.helios_energy_day": heliosEnergyHistory,
            };
          }
          return { "sensor.pv_power": actualHistory };
        },
      };

      const common = {
        provider_1: { name: "Solcast", color: "#22C55E", marker: "circle" },
        provider_2: { name: "Helios Forecast", color: "#7C4DFF", marker: "circle" },
        interval_count_entity: "counter.intervals",
        snapshot_entity: "input_text.snapshot",
        minimum_intervals: 8,
      };

      const power = document.querySelector("#power");
      power.setConfig({
        type: "custom:pv-forecast-quality-card",
        metric: "power",
        ...common,
        provider_1: { ...common.provider_1, entity: "sensor.solcast_mae" },
        provider_2: { ...common.provider_2, entity: "sensor.helios_mae" },
      });
      power.hass = hass;

      const energy = document.querySelector("#energy");
      energy.setConfig({
        type: "custom:pv-forecast-quality-card",
        metric: "energy",
        ...common,
        provider_1: { ...common.provider_1, entity: "sensor.solcast_energy" },
        provider_2: { ...common.provider_2, entity: "sensor.helios_energy" },
      });
      energy.hass = hass;

      const day = document.querySelector("#day");
      day.setConfig({
        type: "custom:pv-forecast-day-card",
        title: "PV-Leistung heute",
        actual: {
          name: "Ist-Leistung",
          entity: "sensor.pv_power",
          color: "#F59E0B",
          unit: "W",
        },
        forecast_1: {
          name: "Solcast",
          entity: "sensor.solcast_today",
          color: "#22C55E",
          unit: "kW",
          attribute: "detailedForecast",
          datetime_key: "period_start",
          value_key: "pv_estimate",
        },
        forecast_2: {
          name: "Helios Forecast",
          entity: "sensor.helios_power",
          color: "#7C4DFF",
          unit: "W",
          attribute: "forecast",
          datetime_key: "datetime",
          value_key: "watts",
        },
      });
      day.hass = hass;

      const history = document.querySelector("#history");
      history.setConfig({
        type: "custom:pv-forecast-history-card",
        title: "Prognosequalität · 30 Tage",
        days: 30,
        day_offset: -1,
        default_metric: "energy",
        actual_color: "#F59E0B",
        provider_1: {
          name: "Solcast",
          color: "#22C55E",
          mae_entity: "sensor.solcast_mae_day",
          energy_entity: "sensor.solcast_energy_day",
        },
        provider_2: {
          name: "Helios Forecast",
          color: "#7C4DFF",
          mae_entity: "sensor.helios_mae_day",
          energy_entity: "sensor.helios_energy_day",
        },
      });
      history.hass = hass;
    </script>
  </body>
</html>
